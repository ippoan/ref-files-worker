name = "ref-files-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# auth-worker と同じアカウント。
account_id = "24b45709d060d957340180e995f0d373"

[vars]
WORKER_ENV = "prod"
# auth-worker origin — `Authorization: Bearer <mcp jwt>` の `aud` / 公開鍵検証で参照。
AUTH_WORKER_ORIGIN = "https://auth.ippoan.org"
# JWT の `aud` claim。auth-worker の mcp-jwt 実装と一致させる。
MCP_JWT_AUDIENCE = "https://ref-files.ippoan.org"

[observability]
enabled = true
head_sampling_rate = 1

# Custom domain。`wrangler deploy` で DNS record + route が自動生成される。
# `ref-files-staging.ippoan.org` は廃止 (Refs #6) — `ref-files.ippoan.org`
# 1 本立てで staging / prod の区別を持たない単一 env 運用に切替。
[[routes]]
pattern = "ref-files.ippoan.org"
custom_domain = true

# D1: メタデータ (repos / folders / files / revisions)。
[[d1_databases]]
binding = "DB"
database_name = "ref_files"
database_id = "bae2cf6d-3f5c-4c1a-8c58-34ac312107c1"
migrations_dir = "migrations"

# R2: ファイル本体。Key 形式は `files/{repo_id}/{file_id}/{rev_number}`。
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "ref-files-blobs"

# ─── Shared HS256 secret (Secrets Store) ────────────────────────────────────
# `auth-worker` と同じ account-level Secrets Store entry `INTERNAL_SHARED_SECRET`
# を bind し、両 worker が物理的に同一の値を見る。
#
# 2 binding に分けるのは role を意図的に分離するため:
#   - `INTERNAL_SHARED_SECRET` → `/mcp/introspect` Mode 2 (raw shared secret 認証)
#   - `MCP_JWT_SECRET`         → HS256 JWT 署名鍵 (auth-worker mint / verify)
# 値は同一 entry なので drift しない (= rotate も inventory 1 コマンド)。
# 旧 entry `mcp-internal-shared-secret-{prod,staging}` は廃止 (Refs
# ippoan/mcp-relay-rs#21, ippoan/mcp-relay-rs#27 と同じ統合)。
#
# `wrangler secret put MCP_JWT_SECRET` は不要 (Secrets Store binding 経由)。
[[secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[secrets_store_secrets]]
binding = "MCP_JWT_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"
