name: Sync ts-rs types

# Single source of truth: ippoan/mcp-relay-rs binaries/ref-files-mcp-server-rs/src/types/
# (Rust + ts-rs). The old standalone `ippoan/ref-files-mcp-server-rs` was
# archived after the Phase 2 binary absorption (mcp-relay-rs#9) — every type
# change lands in the monorepo now.
#
# This workflow regenerates the TypeScript bindings from a pinned ref of
# mcp-relay-rs and fails the PR if `src/types/` here drifts.
#
# Trigger model:
#   - pull_request: PR がここの DTO を勝手に書き換えていないかチェック
#   - workflow_dispatch: Rust 側が更新された時に手動で同期させる用 (将来は
#     repository_dispatch で mcp-relay-rs CI から発火)
#
# 既定の ref は `main`。Rust 側 release tag に固定したい場合は
# workflow_dispatch の `rust_ref` input で上書きする。

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/types/**'
      - '.github/workflows/sync-types.yml'
  push:
    branches: [main]
    paths:
      - 'src/types/**'
      - '.github/workflows/sync-types.yml'
  workflow_dispatch:
    inputs:
      rust_ref:
        description: 'Ref of ippoan/mcp-relay-rs to regenerate from'
        required: false
        type: string
        default: 'main'

permissions:
  contents: read

jobs:
  drift-check:
    name: ts-rs drift check
    runs-on: ubuntu-latest
    env:
      # Path to the ref-files-mcp-server-rs crate inside the mcp-relay-rs
      # monorepo. Centralised here so future re-layouts only touch one line.
      CRATE_PATH: mcp-relay-rs/binaries/ref-files-mcp-server-rs
    steps:
      - name: Checkout ref-files-worker
        uses: actions/checkout@v4
        with:
          path: worker

      - name: Checkout mcp-relay-rs
        uses: actions/checkout@v4
        with:
          repository: ippoan/mcp-relay-rs
          ref: ${{ inputs.rust_ref || 'main' }}
          path: mcp-relay-rs

      # Defensive guard: if the crate ever gets renamed / moved and CRATE_PATH
      # drifts, fail with a clearer message than `cargo: file not found`.
      - name: Verify ref-files-mcp-server-rs crate is present
        run: |
          if [ ! -f "${CRATE_PATH}/Cargo.toml" ]; then
            echo "::error::Cargo.toml missing at ${CRATE_PATH} — did mcp-relay-rs move the crate? Update CRATE_PATH in sync-types.yml."
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Cache the entire mcp-relay-rs workspace — sharing with the Rust
          # repo's own rust-ci.yml runs.
          workspaces: mcp-relay-rs
          shared-key: ref-files-mcp-server-rs

      - name: Regenerate ts-bindings
        working-directory: ${{ env.CRATE_PATH }}
        run: cargo run --bin gen-ts --locked

      - name: Copy bindings into worker/src/types
        run: |
          set -euo pipefail
          # Preserve the README.md that documents the directory; replace only
          # the generated .ts files (delete-then-copy to catch removed types).
          find worker/src/types -name '*.ts' -type f -delete
          cp "${CRATE_PATH}/ts-bindings/"*.ts worker/src/types/

      - name: Fail on drift
        working-directory: worker
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- src/types/; then
            echo "::error::src/types/ drifted from mcp-relay-rs binaries/ref-files-mcp-server-rs."
            echo "Regenerate locally with:"
            echo "  (cd ../mcp-relay-rs/binaries/ref-files-mcp-server-rs && cargo run --bin gen-ts)"
            echo "  cp ../mcp-relay-rs/binaries/ref-files-mcp-server-rs/ts-bindings/*.ts ./src/types/"
            exit 1
          fi
          echo "src/types/ is in sync with mcp-relay-rs binaries/ref-files-mcp-server-rs."
