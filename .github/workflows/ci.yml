name: CI

# auth-worker / 他 worker repo と同じ frontend-ci.yml caller pattern。
# PR で staging deploy、tag push で prod deploy が走る。

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# frontend-ci.yml は内蔵 auto-merge / secret-verify を持つため
# top-level で contents:write + pull-requests:write + id-token:write が必須
# (ci-workflows/CLAUDE.md "Option A" 参照)。`id-token:write` が無いと
# secret-verify を使わない caller でも parse 時 check で startup_failure する。
permissions:
  contents: write
  pull-requests: write
  packages: read
  id-token: write

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: worker
      install_command: 'npm install'
      typecheck_command: 'npx tsc --noEmit'
      has_tests: true
      post_install_script: 'npx wrangler types'
      # Single-env 運用 (Refs #6) — staging URL は廃止し ref-files.ippoan.org
      # 1 本立て。PR merge / tag push どちらも同じ `wrangler deploy` を走らせる。
      #
      # `wrangler d1 migrations apply ref_files --remote` を deploy の **前**
      # に走らせる: schema 変更を含む deploy で migration が抜けると worker
      # が起動直後に `no such table` で落ちる (実害: PR #14 merge 後
      # `pending_uploads` 未 apply で /upload/:token が 500 を返した)。
      # 対話 confirm は wrangler 側が CI 環境を検出して自動 skip する
      # (`--yes` フラグは現行 wrangler で削除済み)。
      deploy_staging_script: 'npx wrangler d1 migrations apply ref_files --remote && npx wrangler deploy'
      deploy_release_script: 'npx wrangler d1 migrations apply ref_files --remote && npx wrangler deploy'
    secrets: inherit
