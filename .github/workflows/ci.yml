name: CI

# Reuses ci-workflows/frontend-ci.yml with project_type=worker (typecheck via
# `tsc --noEmit`, deploy via `wrangler deploy`). Same pattern other ippoan
# worker repos (e.g. auth-worker) use.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: worker
      # `npm install` (not `npm ci`) — Phase 0 ships no package-lock.json yet;
      # auth-worker uses the same flag for the same reason.
      install_command: 'npm install'
      # Phase 0 ships no tests yet; flip to true when Phase 1 lands vitest.
      has_tests: false
      # No staging d1/r2 provisioned yet — skip deploy until Phase 1 wires
      # `wrangler.toml [env.staging]`.
      has_deploy: false
    secrets: inherit
